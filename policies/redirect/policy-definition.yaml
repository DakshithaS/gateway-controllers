name: redirect
version: v0.9.0
description: |
  Issue an HTTP redirect to the client without forwarding the request upstream
  (Gateway-API RequestRedirect semantics).

  Only the components you set are overridden; every component left unset is
  preserved from the incoming request (scheme, host, path, query). The port is
  preserved too, except that overriding the scheme without also setting a port
  switches to the target scheme's default port. The policy builds the Location
  header from the request plus the overrides and returns the configured redirect
  status.

parameters:
  type: object
  additionalProperties: false
  properties:
    statusCode:
      type: integer
      x-wso2-policy-advanced-param: false
      description: HTTP redirect status code.
      enum:
        - 301
        - 302
        - 303
        - 307
        - 308
      default: 302
    scheme:
      type: string
      x-wso2-policy-advanced-param: false
      description: Redirect scheme. Unset preserves the request scheme.
      enum:
        - http
        - https
    hostname:
      type: string
      x-wso2-policy-advanced-param: false
      description: Redirect host. Unset preserves the request Host.
      minLength: 1
      maxLength: 253
      pattern: "^[a-zA-Z0-9.-]+$"
    port:
      type: integer
      x-wso2-policy-advanced-param: false
      description: >
        Redirect port. Unset preserves the request port, or uses the well-known
        port of the redirect scheme (80 for http, 443 for https) when the scheme
        is changed.
      minimum: 1
      maximum: 65535
    path:
      type: object
      x-wso2-policy-advanced-param: false
      description: Path rewrite for the redirect. Unset preserves the request path.
      additionalProperties: false
      properties:
        mode:
          type: string
          x-wso2-policy-advanced-param: false
          description: >
            How `value` rewrites the path. `full` replaces the entire request
            path with `value`. `prefix` replaces only the portion of the path
            that matched the operation's path prefix with `value`, preserving
            the remaining suffix.
          enum:
            - full
            - prefix
        value:
          type: string
          x-wso2-policy-advanced-param: false
          description: Replacement path. Must start with "/".
          maxLength: 8192
          pattern: "^/.*$"
      required:
        - mode
        - value

systemParameters:
  type: object
  additionalProperties: false
  properties: {}
