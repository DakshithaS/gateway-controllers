name: aws-authentication
version: v0.10.0
description: |
  Signs outbound requests to AWS-hosted backends using AWS Signature Version 4
  (SigV4) before they are forwarded upstream. Supports four credential-acquisition
  modes: assuming an IAM role via AWS STS (sts-assume-role), using a static IAM
  user access key/secret pair (iam-user-access-key), IAM Roles for Service
  Accounts (irsa) on Kubernetes clusters with AWS OIDC federation configured
  (e.g. EKS), or resolving credentials directly from the AWS SDK's default
  credential provider chain with no AssumeRole call and no static keys
  (default-credential-chain), for compute that already runs under the target
  IAM role (EC2 instance profile, ECS task role, Lambda execution role, or an
  EKS Pod Identity association).

parameters:
  type: object
  additionalProperties: false
  properties:
    service:
      type: string
      x-wso2-policy-advanced-param: false
      minLength: 1
      description: |
        AWS SigV4 signing name of the target backend service (for example
        "execute-api" for API Gateway, "lambda" for Lambda Function URLs,
        "es" for OpenSearch, "s3" for S3).
    region:
      type: string
      x-wso2-policy-advanced-param: false
      minLength: 1
      description: |
        AWS region of the target backend (for example "us-east-1").
    authenticationType:
      type: string
      x-wso2-policy-advanced-param: false
      description: |
        Selects how AWS credentials used to sign requests are obtained.
        "sts-assume-role" calls AWS STS AssumeRole to obtain temporary
        credentials before signing. "iam-user-access-key" signs directly
        with a static, long-lived IAM user access key/secret pair (optionally
        paired with a session token if the configured key is already temporary).
        "irsa" calls AWS STS AssumeRoleWithWebIdentity using a Kubernetes
        projected service account token (IAM Roles for Service Accounts);
        only usable when the gateway runs on a Kubernetes cluster federated
        with AWS IAM via OIDC, such as EKS. "default-credential-chain" signs
        directly with credentials resolved from the AWS SDK's default
        credential provider chain (environment variables, shared config
        files, EC2 instance profile, ECS task role, Lambda execution role, or
        an EKS Pod Identity association) — no AssumeRole call and no static
        keys configured on the API at all; use this when the gateway's own
        compute environment already runs under the exact IAM role needed.
      enum:
        - sts-assume-role
        - iam-user-access-key
        - irsa
        - default-credential-chain
    awsAccessKeyID:
      type: string
      x-wso2-policy-advanced-param: true
      minLength: 1
      description: |
        AWS access key ID. Required when authenticationType is
        "iam-user-access-key". Optional base credential for "sts-assume-role"
        (if omitted, the default AWS SDK credential chain is used to call
        sts:AssumeRole).
    awsSecretAccessKey:
      type: string
      x-wso2-policy-advanced-param: true
      minLength: 1
      description: |
        AWS secret access key paired with awsAccessKeyID. Required when
        authenticationType is "iam-user-access-key".
    awsSessionToken:
      type: string
      x-wso2-policy-advanced-param: true
      minLength: 1
      description: |
        Optional AWS session token, only meaningful when awsAccessKeyID /
        awsSecretAccessKey already represent temporary credentials.
    awsRoleARN:
      type: string
      x-wso2-policy-advanced-param: true
      minLength: 1
      description: |
        ARN of the IAM role to assume. Required when authenticationType is
        "sts-assume-role". For "irsa", this is optional: if omitted, it falls
        back to the AWS_ROLE_ARN environment variable that the EKS Pod
        Identity Webhook injects automatically for a ServiceAccount annotated
        with "eks.amazonaws.com/role-arn". Not applicable to
        "default-credential-chain", which never assumes a role.
    awsRoleExternalID:
      type: string
      x-wso2-policy-advanced-param: true
      minLength: 1
      description: |
        Optional External ID passed to sts:AssumeRole for cross-account role
        assumption hardening. Only applicable for "sts-assume-role" (the
        AssumeRoleWithWebIdentity call used by "irsa" does not support an
        External ID).
    awsRoleSessionName:
      type: string
      x-wso2-policy-advanced-param: true
      minLength: 1
      default: aws-authentication-session
      description: |
        Optional session name used when assuming the role. Defaults to
        "aws-authentication-session". Applicable for "sts-assume-role" and
        "irsa". Not applicable to "default-credential-chain", which never
        assumes a role.
  required:
    - service
    - region
    - authenticationType
