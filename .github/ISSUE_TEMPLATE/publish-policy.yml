name: Publish Policy
description: Publish a policy version to the Policy Hub
title: "[Publish Policy]: "
labels:
  - publish-policy
body:
  - type: markdown
    attributes:
      value: |
        Filing this issue triggers the Policy Hub publish workflow. Only repository
        owners/members/collaborators can trigger a publish this way.
  # BEGIN AUTO-GENERATED FIELDS (from docs/ - run .github/scripts/generate_policy_inputs.py to refresh, do not edit by hand)
  - type: dropdown
    id: policy_name
    attributes:
      label: Policy name
      description: Name of the policy to publish. Pick "Other" to type one manually.
      options:
        - advanced-ratelimit
        - analytics-header-filter
        - api-key-auth
        - aws-authentication
        - aws-bedrock-guardrail
        - azure-content-safety-content-moderation
        - backend-jwt
        - basic-auth
        - basic-ratelimit
        - content-length-guardrail
        - cors
        - dynamic-endpoint
        - granite-guardian-prompt-injection
        - host-rewrite
        - interceptor-service
        - json-schema-guardrail
        - json-xml-mediator
        - jwt-auth
        - llm-cost
        - llm-cost-based-ratelimit
        - log-message
        - mcp-acl-list
        - mcp-auth
        - mcp-authz
        - mcp-ratelimit
        - mcp-rewrite
        - model-round-robin
        - model-weighted-round-robin
        - nvidia-nemoguard-content-safety
        - opaque-token-auth
        - openai-to-bedrock-transformer
        - pii-masking-regex
        - prompt-compressor
        - prompt-decorator
        - prompt-template
        - redirect
        - regex-guardrail
        - remove-headers
        - request-rewrite
        - respond
        - semantic-cache
        - semantic-prompt-guard
        - semantic-tool-filtering
        - sentence-count-guardrail
        - set-headers
        - subscription-validation
        - token-based-ratelimit
        - url-guardrail
        - websub-hmac-auth
        - word-count-guardrail
        - Other
    validations:
      required: true
  - type: input
    id: policy_name_other
    attributes:
      label: Custom policy name (used only when "Other" is selected above)
    validations:
      required: false
  - type: dropdown
    id: minor_version
    attributes:
      label: Minor version
      description: e.g., 0.1, 0.2. Pick "Other" to type one manually.
      options:
        - "0.1"
        - "0.2"
        - "0.3"
        - "0.8"
        - "0.9"
        - "1.0"
        - "1.1"
        - "1.2"
        - Other
    validations:
      required: true
  - type: input
    id: minor_version_other
    attributes:
      label: Custom minor version (used only when "Other" is selected above)
    validations:
      required: false
  # END AUTO-GENERATED FIELDS
