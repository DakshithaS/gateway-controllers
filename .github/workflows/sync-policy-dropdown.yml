name: Sync Publish Policy Dropdown

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/scripts/generate_policy_inputs.py'
  workflow_dispatch: {}

jobs:
  sync-ci-safe-files:
    # Safe to automate: policy-options.json and the ISSUE_TEMPLATE form are
    # plain data/definition files, not workflow definitions, so the default
    # GITHUB_TOKEN is allowed to push changes to them.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Refresh policy-options.json and the issue form from docs/
        run: python3 .github/scripts/generate_policy_inputs.py --ci-safe

      - name: Commit if changed
        run: |
          if git diff --quiet -- .github/policies/policy-options.json .github/ISSUE_TEMPLATE/publish-policy.yml; then
            echo "No changes to sync"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/policies/policy-options.json .github/ISSUE_TEMPLATE/publish-policy.yml
          git commit -m "chore: sync policy dropdown options from docs/"
          git push

  check-workflow-dropdown:
    # GitHub refuses to let the default GITHUB_TOKEN push changes to files
    # under .github/workflows/, so this job can only check for drift, not
    # fix it. If it fails, a maintainer must run the generator locally
    # (python3 .github/scripts/generate_policy_inputs.py) and push the
    # updated publish-policy.yml by hand.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check publish-policy.yml dropdown against docs/
        run: python3 .github/scripts/generate_policy_inputs.py --check
