name: Publish Policy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to publish to'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      policy_name:
        description: 'Name of the policy to publish'
        required: true
        type: string
      minor_version:
        description: 'Minor version (e.g., 0.1, 0.2)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Validate inputs and policy existence
      run: |
        POLICY_NAME="${{ github.event.inputs.policy_name }}"
        MINOR_VERSION="${{ github.event.inputs.minor_version }}"
        
        # Trim whitespace from policy name
        POLICY_NAME=$(echo "$POLICY_NAME" | xargs)
        
        # Validate policy name: only letters, numbers, hyphen, underscore; no slashes or traversal
        if [[ -z "$POLICY_NAME" ]]; then
          echo "❌ Policy name is required"
          echo "## ❌ Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** Policy name is required" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
        if [[ ! "$POLICY_NAME" =~ ^[A-Za-z0-9_-]+$ ]]; then
          echo "❌ Policy name must contain only letters, numbers, hyphens, and underscores (no spaces, slashes, or special characters)"
          echo "## ❌ Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** Policy name must contain only letters, numbers, hyphens, and underscores" >> $GITHUB_STEP_SUMMARY
          echo "**Invalid name:** \`$POLICY_NAME\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
        # Validate minor version format
        if [[ ! "$MINOR_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
          echo "❌ Minor version must be in format X.Y (e.g., 0.1, 1.2)"
          echo "## ❌ Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** Minor version must be in format X.Y (e.g., 0.1, 1.2)" >> $GITHUB_STEP_SUMMARY
          echo "**Invalid version:** \`$MINOR_VERSION\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
        # Check if policy directory exists in docs/
        DOCS_POLICY_DIR="docs/$POLICY_NAME"
        if [[ ! -d "$DOCS_POLICY_DIR" ]]; then
          echo "❌ Policy directory not found in docs/: $DOCS_POLICY_DIR"
          echo "## ❌ Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** Policy directory not found" >> $GITHUB_STEP_SUMMARY
          echo "**Missing:** \`$DOCS_POLICY_DIR\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
        # Check if version directory exists
        VERSION_DIR="$DOCS_POLICY_DIR/v$MINOR_VERSION"
        if [[ ! -d "$VERSION_DIR" ]]; then
          echo "❌ Version directory not found: $VERSION_DIR"
          echo "## ❌ Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** Version directory not found" >> $GITHUB_STEP_SUMMARY
          echo "**Missing:** \`$VERSION_DIR\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Available versions for $POLICY_NAME:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -1 "$DOCS_POLICY_DIR/" 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No versions found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
        # Check if policies directory exists
        POLICIES_DIR="policies/$POLICY_NAME"
        if [[ ! -d "$POLICIES_DIR" ]]; then
          echo "❌ Policy directory not found in policies/: $POLICIES_DIR"
          echo "## ❌ Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** Policy directory not found in policies/" >> $GITHUB_STEP_SUMMARY
          echo "**Missing:** \`$POLICIES_DIR\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
        echo "✅ Policy validation passed"
        echo "POLICY_NAME=$POLICY_NAME" >> $GITHUB_ENV
        echo "MINOR_VERSION=$MINOR_VERSION" >> $GITHUB_ENV
        echo "VERSION_DIR=$VERSION_DIR" >> $GITHUB_ENV
        echo "POLICIES_DIR=$POLICIES_DIR" >> $GITHUB_ENV
      
    - name: Setup Node.js for JSON validation
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        
    - name: Install jq for JSON processing
      run: sudo apt-get update && sudo apt-get install -y jq
      
    - name: Validate API configuration
      id: api-config
      env:
        POLICY_HUB_URL: ${{ vars.POLICY_HUB_URL }}
      run: |
        if [[ -z "${POLICY_HUB_URL:-}" ]]; then
          echo "❌ Missing POLICY_HUB_URL environment variable"
          echo "## ❌ Configuration Error" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** Missing POLICY_HUB_URL environment variable" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To fix this:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to repository Settings → Environments" >> $GITHUB_STEP_SUMMARY
          echo "2. Select the \`${{ github.event.inputs.environment }}\` environment" >> $GITHUB_STEP_SUMMARY
          echo "3. Add a variable named \`POLICY_HUB_URL\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
        echo "✅ API configuration validated"
        echo "API_URL=$POLICY_HUB_URL" >> $GITHUB_ENV
        
    - name: Parse and validate metadata.json
      run: |
        set -euo pipefail
        METADATA_FILE="$VERSION_DIR/metadata.json"
        
        # Check if metadata.json exists
        if [[ ! -f "$METADATA_FILE" ]]; then
          echo "❌ metadata.json not found: $METADATA_FILE"
          exit 1
        fi
        
        # Validate JSON syntax
        if ! jq empty "$METADATA_FILE" 2>/dev/null; then
          echo "❌ Invalid JSON in metadata.json"
          cat "$METADATA_FILE"
          exit 1
        fi
        
        # Extract and validate required fields
        name=$(jq -r '.name // empty' "$METADATA_FILE")
        version=$(jq -r '.version // empty' "$METADATA_FILE")
        displayName=$(jq -r '.displayName // empty' "$METADATA_FILE")
        provider=$(jq -r '.provider // empty' "$METADATA_FILE")
        categories=$(jq -r '.categories // empty' "$METADATA_FILE")
        description=$(jq -r '.description // empty' "$METADATA_FILE")
        
        # Check required fields
        MISSING_FIELDS=()
        [[ -z "$name" ]] && MISSING_FIELDS+=("name")
        [[ -z "$version" ]] && MISSING_FIELDS+=("version")
        [[ -z "$displayName" ]] && MISSING_FIELDS+=("displayName")
        [[ -z "$provider" ]] && MISSING_FIELDS+=("provider")
        [[ -z "$categories" || "$categories" == "null" ]] && MISSING_FIELDS+=("categories")
        [[ -z "$description" ]] && MISSING_FIELDS+=("description")
        
        if [[ ${#MISSING_FIELDS[@]} -gt 0 ]]; then
          echo "❌ Missing required fields in metadata.json"
          echo "## ❌ Metadata Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** Missing required fields in metadata.json" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`$METADATA_FILE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Missing fields:**" >> $GITHUB_STEP_SUMMARY
          for field in "${MISSING_FIELDS[@]}"; do
            echo "- \`$field\`" >> $GITHUB_STEP_SUMMARY
          done
          exit 1
        fi
        
        # Validate that .categories is a non-empty array
        if ! jq -e '.categories | type=="array" and length>0' "$METADATA_FILE" >/dev/null; then
          echo "❌ 'categories' must be a non-empty array in metadata.json"
          echo "## ❌ Metadata Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** 'categories' must be a non-empty array" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`$METADATA_FILE\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
        # Validate that name matches input
        if [[ "$name" != "$POLICY_NAME" ]]; then
          echo "❌ Policy name mismatch: metadata.json has '$name', but input is '$POLICY_NAME'"
          echo "## ❌ Metadata Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** Policy name mismatch" >> $GITHUB_STEP_SUMMARY
          echo "- **In metadata.json:** \`$name\`" >> $GITHUB_STEP_SUMMARY
          echo "- **In workflow input:** \`$POLICY_NAME\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
        # Validate that version matches input (remove 'v' prefix if present)
        metadata_version=${version#v}
        if [[ "$metadata_version" != "$MINOR_VERSION" ]]; then
          echo "❌ Version mismatch: metadata.json has '$version', but input is '$MINOR_VERSION'"
          echo "## ❌ Metadata Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Error:** Version mismatch" >> $GITHUB_STEP_SUMMARY
          echo "- **In metadata.json:** \`$version\`" >> $GITHUB_STEP_SUMMARY
          echo "- **In workflow input:** \`$MINOR_VERSION\`" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
        echo "✅ Metadata validation passed"
        echo "METADATA_NAME=$name" >> $GITHUB_ENV
        echo "METADATA_VERSION=$metadata_version" >> $GITHUB_ENV
        
    - name: Create policy package
      run: |
        # Create temporary directory for packaging
        TEMP_DIR=$(mktemp -d)
        PACKAGE_DIR="$TEMP_DIR/package"
        mkdir -p "$PACKAGE_DIR"
        
        # Copy docs folder if it exists
        DOCS_SOURCE="$VERSION_DIR/docs"
        if [[ -d "$DOCS_SOURCE" ]]; then
          cp -r "$DOCS_SOURCE" "$PACKAGE_DIR/"
          echo "✅ Copied docs folder"
        else
          echo "❌ docs folder not found: $DOCS_SOURCE"
          exit 1
        fi
        
        # Copy assets folder if it exists
        ASSETS_SOURCE="$VERSION_DIR/assets"
        if [[ -d "$ASSETS_SOURCE" ]]; then
          cp -r "$ASSETS_SOURCE" "$PACKAGE_DIR/"
          echo "✅ Copied assets folder"
        else
          echo "ℹ️  No assets folder found (optional)"
        fi
        
        # Create zip file
        ZIP_NAME="${METADATA_NAME}-${METADATA_VERSION}.zip"
        ZIP_PATH="$GITHUB_WORKSPACE/$ZIP_NAME"
        
        cd "$PACKAGE_DIR"
        zip -r "$ZIP_PATH" . -x "*.DS_Store"
        cd "$GITHUB_WORKSPACE"
        
        # Verify zip was created
        if [[ ! -f "$ZIP_PATH" ]]; then
          echo "❌ Failed to create zip file: $ZIP_PATH"
          exit 1
        fi
        
        echo "✅ Created policy package: $ZIP_PATH"
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV
        
    - name: Publish policy
      env:
        POLICY_HUB_TOKEN: ${{ secrets.POLICY_HUB_TOKEN }}
      run: |
        # Read metadata.json content
        METADATA_CONTENT=$(cat "$VERSION_DIR/metadata.json")
        
        # Build curl args array safely
        curl_args=("-s" "-w" "%{http_code}" "-o" "response.txt" "-X" "POST" "--max-time" "30" "--connect-timeout" "10" "$API_URL/policies/$METADATA_NAME/versions/$METADATA_VERSION")
        
        # Add authentication header if token is provided
        if [[ -n "${POLICY_HUB_TOKEN:-}" ]]; then
          curl_args+=("-H" "api-key: $POLICY_HUB_TOKEN")
        fi
        
        # Add form fields
        curl_args+=("--form-string" "metadata=$METADATA_CONTENT")
        curl_args+=("-F" "docs=@$GITHUB_WORKSPACE/$ZIP_NAME")
        
        # Execute the curl command safely
        HTTP_STATUS=$(curl "${curl_args[@]}")
        
        echo "HTTP Status: $HTTP_STATUS"
        
        # Read response
        if [[ -f response.txt ]]; then
          RESPONSE_BODY=$(cat response.txt)
        else
          RESPONSE_BODY="No response file found"
        fi
        
        # Show response in logs
        echo "📨 API Response:"
        echo "$RESPONSE_BODY"
        echo
        
        # Check if request was successful
        if [[ "$HTTP_STATUS" -ge 200 && "$HTTP_STATUS" -lt 300 ]]; then
          echo "✅ Policy published successfully!"
          
          # Extract status from response
          PUBLISH_STATUS=$(echo "$RESPONSE_BODY" | jq -r '.data.status // "published"' 2>/dev/null || echo "published")
          echo "PUBLISH_STATUS=$PUBLISH_STATUS" >> $GITHUB_ENV
        else
          echo "❌ Policy publishing failed with HTTP status: $HTTP_STATUS"
          
          # Add error details to summary
          echo "## ❌ Publishing Failed" >> $GITHUB_STEP_SUMMARY
          echo "**HTTP Status:** \`$HTTP_STATUS\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Error Response:**" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$RESPONSE_BODY" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        
    - name: Cleanup
      if: always()
      run: |
        # Clean up temporary files
        if [[ -n "$ZIP_NAME" && -f "$ZIP_NAME" ]]; then
          rm -f "$ZIP_NAME"
        fi
        if [[ -n "$TEMP_DIR" && -d "$TEMP_DIR" ]]; then
          rm -rf "$TEMP_DIR"
        fi
        if [[ -f "response.txt" ]]; then
          rm -f response.txt
        fi
        echo "🧹 Cleanup completed"
        
    - name: Summary
      if: success()
      run: |
        echo "🎉 Policy Publishing Summary"
        echo "=========================="
        echo "Policy Name: $METADATA_NAME"
        echo "Version: $METADATA_VERSION"
        echo "Status: ✅ Successfully Published"
        
        # Add final summary
        echo "## 🎉 Policy Published Successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Policy Name** | \`$METADATA_NAME\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Version** | \`$METADATA_VERSION\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Environment** | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Status** | \`$PUBLISH_STATUS\` |" >> $GITHUB_STEP_SUMMARY