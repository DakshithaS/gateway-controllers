name: Release Policy

on:
  workflow_dispatch:
    inputs:
      policy:
        description: "Policy folder name (e.g., ratelimit)"
        required: true
        type: string
      version:
        description: "Version (SemVer: X.Y.Z | X.Y.Z-dev.N | X.Y.Z-rc.N)"
        required: true
        type: string
      release_dev:
        description: "Release to dev"
        required: false
        type: boolean
        default: false
      release_staging:
        description: "Release to staging"
        required: false
        type: boolean
        default: false
      release_production:
        description: "Release to production"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-policy-${{ github.event.inputs.policy }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------
  # Validate, test, and resolve everything needed for release.
  # Runs once regardless of how many environments are selected.
  # ------------------------------------------------------------
  prepare:
    name: Validate, Test & Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      target_dir: ${{ steps.meta.outputs.target_dir }}
      module_path: ${{ steps.meta.outputs.module_path }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      pip_package: ${{ steps.meta.outputs.pip_package }}
      environments: ${{ steps.envs.outputs.environments }}
      tag_existed: ${{ steps.tag-check.outputs.tag_existed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        shell: bash
        env:
          POLICY_INPUT: ${{ inputs.policy }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if ! [[ "$POLICY_INPUT" =~ ^[a-zA-Z0-9-]+$ ]]; then
            echo "::error::Invalid policy name: $POLICY_INPUT"
            exit 1
          fi

          if ! [[ "$VERSION_INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(dev|rc)\.[0-9]+)?$ ]]; then
            echo "::error::Invalid version format: $VERSION_INPUT"
            exit 1
          fi

          echo "✅ Inputs validated"

      - name: Determine target environments
        id: envs
        shell: bash
        env:
          RELEASE_DEV: ${{ inputs.release_dev }}
          RELEASE_STAGING: ${{ inputs.release_staging }}
          RELEASE_PRODUCTION: ${{ inputs.release_production }}
        run: |
          set -euo pipefail

          ENVS=()
          [[ "$RELEASE_DEV" == "true" ]] && ENVS+=("dev")
          [[ "$RELEASE_STAGING" == "true" ]] && ENVS+=("staging")
          [[ "$RELEASE_PRODUCTION" == "true" ]] && ENVS+=("production")

          if [[ ${#ENVS[@]} -eq 0 ]]; then
            echo "::error::At least one of release_dev, release_staging, release_production must be checked"
            exit 1
          fi

          JSON=$(printf '%s\n' "${ENVS[@]}" | jq -R . | jq -sc .)
          echo "Selected environments: $JSON"
          echo "environments=$JSON" >> "$GITHUB_OUTPUT"

      - name: Resolve module metadata
        id: meta
        shell: bash
        env:
          POLICY_INPUT: ${{ inputs.policy }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          POLICY="$POLICY_INPUT"
          VERSION="$VERSION_INPUT"
          MAJOR="${VERSION%%.*}"

          if [[ "$MAJOR" == "0" || "$MAJOR" == "1" ]]; then
            TARGET_DIR="policies/$POLICY"
            MODULE_PATH="github.com/${{ github.repository }}/policies/$POLICY"
          else
            TARGET_DIR="policies/$POLICY/v$MAJOR"
            MODULE_PATH="github.com/${{ github.repository }}/policies/$POLICY/v$MAJOR"
          fi

          TAG_NAME="policies/$POLICY/v$VERSION"

          # For Python policies, construct the shortened URL (same pattern as Go MODULE_PATH
          # but with @vMAJOR suffix instead of /vMAJOR path segment).
          PIP_PACKAGE=""
          if [[ -f "$TARGET_DIR/pyproject.toml" ]]; then
            PIP_PACKAGE="github.com/${{ github.repository }}/policies/$POLICY@v$MAJOR"
          fi

          echo "target_dir=$TARGET_DIR" >> "$GITHUB_OUTPUT"
          echo "module_path=$MODULE_PATH" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "pip_package=$PIP_PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Check for existing release tag
        id: tag-check
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.meta.outputs.tag_name }}"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "ℹ️  Tag already exists: $TAG_NAME"
            git show "$TAG_NAME" --no-patch --format="Tagged commit: %H (%ai) - %s"
            echo "Checking out that exact commit so every selected environment releases identical content."
            git checkout "refs/tags/$TAG_NAME"
            echo "tag_existed=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Tag does not exist yet — this is the first release of this version"
            echo "tag_existed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate policy structure
        shell: bash
        run: |
          set -euo pipefail

          DIR="${{ steps.meta.outputs.target_dir }}"

          [[ -d "$DIR" ]] || { echo "::error::Missing directory: $DIR"; exit 1; }
          [[ -f "$DIR/policy-definition.yaml" ]] || { echo "::error::Missing policy-definition.yaml in $DIR"; exit 1; }

          if [[ -f "$DIR/go.mod" ]]; then
            echo "RUNTIME=go" >> "$GITHUB_ENV"
            EXPECTED="${{ steps.meta.outputs.module_path }}"
            ACTUAL=$(grep '^module ' "$DIR/go.mod" | awk '{print $2}')

            [[ "$EXPECTED" == "$ACTUAL" ]] || {
              echo "::error::go.mod module mismatch. Expected: $EXPECTED, Actual: $ACTUAL"
              exit 1
            }
            echo "✅ Go Policy structure valid"
          elif [[ -f "$DIR/pyproject.toml" ]]; then
            echo "RUNTIME=python" >> "$GITHUB_ENV"

            # Validate src layout: src/ directory must exist
            [[ -d "$DIR/src" ]] || { echo "::error::Missing src/ directory in $DIR (expected src layout)"; exit 1; }

            # Validate that at least one Python package exists under src/
            PKG_COUNT=$(find "$DIR/src" -mindepth 1 -maxdepth 1 -type d ! -name '__pycache__' | wc -l | tr -d ' ')
            [[ "$PKG_COUNT" -ge 1 ]] || { echo "::error::No Python package found under $DIR/src/"; exit 1; }

            # Validate that the package contains a policy.py module
            POLICY_PY=$(find "$DIR/src" -mindepth 2 -maxdepth 2 -name 'policy.py' -type f | head -1)
            [[ -n "$POLICY_PY" ]] || { echo "::error::Missing policy.py module in src package"; exit 1; }

            # Validate that tests/ directory exists
            [[ -d "$DIR/tests" ]] || { echo "::error::Missing tests/ directory in $DIR"; exit 1; }

            echo "✅ Python Policy structure valid (src layout)"
          else
            echo "::error::Current implementation requires either go.mod or pyproject.toml"
            exit 1
          fi

      - name: Validate version consistency
        shell: bash
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          DIR="${{ steps.meta.outputs.target_dir }}"
          INPUT_VERSION="$VERSION_INPUT"

          POLICY_DEF_VERSION=$(yq eval '.version' "$DIR/policy-definition.yaml")
          POLICY_DEF_VERSION=${POLICY_DEF_VERSION#v}

          echo "Input version: $INPUT_VERSION"
          echo "Policy definition version: $POLICY_DEF_VERSION"

          if [[ "$INPUT_VERSION" != "$POLICY_DEF_VERSION" ]]; then
            echo "::error::Version mismatch: workflow input ($INPUT_VERSION) vs policy-definition.yaml ($POLICY_DEF_VERSION)"
            exit 1
          fi

          if [[ "${RUNTIME:-}" == "python" ]]; then
            PYPROJECT_VERSION=$(yq eval '.project.version' "$DIR/pyproject.toml")
            echo "pyproject.toml version: $PYPROJECT_VERSION"

            if [[ "$INPUT_VERSION" != "$PYPROJECT_VERSION" ]]; then
              echo "::error::Version mismatch: workflow input ($INPUT_VERSION) vs pyproject.toml ($PYPROJECT_VERSION)"
              exit 1
            fi
          fi

          echo "✅ Version consistency validated"

      - name: Setup Go
        if: env.RUNTIME == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ steps.meta.outputs.target_dir }}/go.mod
          cache: false

      - name: Setup Python
        if: env.RUNTIME == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python policy dependencies
        if: env.RUNTIME == 'python'
        working-directory: ${{ steps.meta.outputs.target_dir }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f "requirements.txt" ]]; then
            pip install -r requirements.txt
          else
            echo "⚠️ No requirements.txt found, skipping dependency install"
          fi
          # Install the package itself in editable mode (for proper imports in tests)
          pip install -e . --no-deps
          echo "✅ Python policy dependencies installed"

      - name: Run policy tests
        working-directory: ${{ steps.meta.outputs.target_dir }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RUNTIME}" == "go" ]]; then
            go test -v -race ./...
          elif [[ "${RUNTIME}" == "python" ]]; then
            if python -m pytest --version 2>/dev/null; then
              PYTHONDONTWRITEBYTECODE=1 python -m pytest tests/ -v
            else
              PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s tests -p 'test_*.py' -v
            fi
          fi

      - name: Ensure clean working tree
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload policy definition for release
        uses: actions/upload-artifact@v4
        with:
          name: policy-definition
          path: ${{ steps.meta.outputs.target_dir }}/policy-definition.yaml
          retention-days: 1

  # ------------------------------------------------------------
  # Register the policy in Policy Hub, once per selected environment.
  # fail-fast: false so one environment's failure doesn't cancel the others.
  # ------------------------------------------------------------
  release:
    name: Release to ${{ matrix.environment }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.prepare.outputs.environments) }}

    steps:
      - name: Download policy definition
        uses: actions/download-artifact@v4
        with:
          name: policy-definition
          path: ${{ needs.prepare.outputs.target_dir }}

      - name: Register policy in Policy Hub
        shell: bash
        env:
          POLICY_HUB_URL: ${{ vars.POLICY_HUB_URL }}
          POLICY_HUB_TOKEN: ${{ secrets.POLICY_HUB_TOKEN }}
          POLICY_INPUT: ${{ inputs.policy }}
          VERSION_INPUT: ${{ inputs.version }}
          TARGET_DIR: ${{ needs.prepare.outputs.target_dir }}
          ENV_NAME: ${{ matrix.environment }}
        run: |
          set -euo pipefail

          mkdir -p results
          RESULT_FILE="results/release-result-${ENV_NAME}.json"

          if [[ -z "${POLICY_HUB_URL:-}" || -z "${POLICY_HUB_TOKEN:-}" ]]; then
            echo "::warning::Missing POLICY_HUB_URL or POLICY_HUB_TOKEN for environment '$ENV_NAME' — skipping registration"
            jq -n --arg env "$ENV_NAME" --arg status "skipped" --arg message "Missing POLICY_HUB_URL or POLICY_HUB_TOKEN" \
              '{environment: $env, status: $status, message: $message}' > "$RESULT_FILE"
            exit 0
          fi

          RESPONSE=$(curl -sS -w "HTTPSTATUS:%{http_code}" \
            -X POST "$POLICY_HUB_URL/policies/$POLICY_INPUT/versions/$VERSION_INPUT/release" \
            -H "api-key: $POLICY_HUB_TOKEN" \
            -F "definition=@$TARGET_DIR/policy-definition.yaml;type=application/yaml")

          STATUS=$(echo "$RESPONSE" | sed -E 's/.*HTTPSTATUS:([0-9]{3})$/\1/')
          BODY=$(echo "$RESPONSE" | sed -E 's/HTTPSTATUS:[0-9]{3}$//')

          if [[ "$STATUS" =~ ^(200|201)$ ]]; then
            RESULT_STATUS="success"
            MESSAGE="Policy registered successfully"
            echo "✅ Released to $ENV_NAME"
          elif [[ "$STATUS" == "409" ]]; then
            RESULT_STATUS="already_released"
            MESSAGE=$(echo "$BODY" | jq -r '.message // empty' 2>/dev/null || true)
            [[ -z "$MESSAGE" ]] && MESSAGE="Version already released to this environment"
            echo "ℹ️  Already released to $ENV_NAME (HTTP 409) — treating as no-op, not a failure"
          else
            RESULT_STATUS="failed"
            MESSAGE=$(echo "$BODY" | jq -r '.message // empty' 2>/dev/null || true)
            [[ -z "$MESSAGE" ]] && MESSAGE="${BODY:-No response body} (HTTP $STATUS)"
            echo "::error::Registration failed for $ENV_NAME: $MESSAGE"
          fi

          jq -n --arg env "$ENV_NAME" --arg status "$RESULT_STATUS" --arg message "$MESSAGE" --arg http "$STATUS" \
            '{environment: $env, status: $status, message: $message, http_status: $http}' > "$RESULT_FILE"

          if [[ "$RESULT_STATUS" == "failed" ]]; then
            exit 1
          fi

      - name: Upload release result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-result-${{ matrix.environment }}
          path: results/release-result-${{ matrix.environment }}.json
          retention-days: 1

  # ------------------------------------------------------------
  # Aggregate every environment's result into one summary, and create
  # the shared git tag (only if it didn't already exist and at least
  # one environment released successfully).
  # ------------------------------------------------------------
  finalize:
    name: Finalize Release
    needs: [prepare, release]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all release results
        uses: actions/download-artifact@v4
        with:
          pattern: release-result-*
          path: results
          merge-multiple: true

      - name: Aggregate results and tag release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POLICY_INPUT: ${{ inputs.policy }}
          VERSION_INPUT: ${{ inputs.version }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          TAG_EXISTED: ${{ needs.prepare.outputs.tag_existed }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
        run: |
          set -euo pipefail

          # If preparation itself failed (bad input, structure/version mismatch, or a
          # failing test), no environment was ever attempted — report that plainly
          # instead of the misleading "environments failed to release".
          if [[ "$PREPARE_RESULT" != "success" ]]; then
            echo "::error::Release preparation failed — no environment releases were attempted."
            {
              echo "## ❌ Release Failed During Preparation"
              echo ""
              echo "Input validation, policy-structure checks, version-consistency checks, or"
              echo "tests failed before any environment release was attempted."
              echo "See the **Validate, Test & Prepare Release** job logs above for the exact error."
              echo ""
              echo "**Tag:** ❌ Not created"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          ANY_SUCCESS=false
          ANY_FAILURE=false
          TABLE_ROWS=""

          shopt -s nullglob
          for f in results/*.json; do
            ENV_NAME=$(jq -r '.environment' "$f")
            STATUS=$(jq -r '.status' "$f")
            MESSAGE=$(jq -r '.message' "$f")

            case "$STATUS" in
              success) ICON="✅ Released" ;;
              already_released) ICON="ℹ️ Already released" ;;
              skipped) ICON="⚠️ Skipped" ;;
              *) ICON="❌ Failed" ;;
            esac

            TABLE_ROWS+="| $ENV_NAME | $ICON | $MESSAGE |"$'\n'

            case "$STATUS" in
              success|already_released|skipped) ANY_SUCCESS=true ;;
              *) ANY_FAILURE=true ;;
            esac
          done

          if [[ -z "$TABLE_ROWS" ]]; then
            TABLE_ROWS="| - | ❌ No results | Preparation succeeded but no environment reported a result. Check the release job logs. |"$'\n'
            ANY_FAILURE=true
          fi

          if [[ "$TAG_EXISTED" == "true" ]]; then
            TAG_STATUS="ℹ️ Tag \`$TAG_NAME\` already existed — this run released the exact content from that tag, no new tag created."
          elif [[ "$ANY_SUCCESS" == "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git tag -a "$TAG_NAME" -m "Release $POLICY_INPUT v$VERSION_INPUT"
            git push "https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git" "$TAG_NAME"

            TAG_STATUS="✅ Tag \`$TAG_NAME\` created and pushed"
          else
            TAG_STATUS="❌ Tag not created — no environment was released successfully"
          fi

          {
            echo "## Release Summary: $POLICY_INPUT v$VERSION_INPUT"
            echo ""
            echo "| Environment | Status | Message |"
            echo "|-------------|--------|---------|"
            echo -n "$TABLE_ROWS"
            echo ""
            echo "**Tag:** $TAG_STATUS"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$ANY_FAILURE" == "true" ]]; then
            echo "::error::One or more environments failed to release. See the job summary for details."
            exit 1
          fi

          echo "✅ Finalize completed"
